<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Create Organization</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; }
    .card { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); width: 360px; }
    h2 { margin-bottom: 1.5rem; color: #333; }
    label { display: block; margin-bottom: 0.4rem; color: #555; font-size: 14px; }
    input { width: 100%; padding: 0.6rem 0.8rem; border: 1px solid #ddd; border-radius: 4px; margin-bottom: 1rem; font-size: 14px; }
    button { width: 100%; padding: 0.7rem; background: #4f46e5; color: white; border: none; border-radius: 4px; font-size: 15px; cursor: pointer; }
    button:hover { background: #4338ca; }
    .back { background: none; color: #4f46e5; border: 1px solid #4f46e5; margin-top: 0.5rem; }
    .back:hover { background: #f0f2f5; }
    .success { color: green; font-size: 13px; margin-bottom: 1rem; display: none; }
    .error { color: red; font-size: 13px; margin-bottom: 1rem; display: none; }
  </style>
</head>
<body>
  <div class="card">
    <h2>Create Organization</h2>
    <p class="success" id="success">Organization created successfully!</p>
    <p class="error" id="error">Something went wrong.</p>
    <label>Organization Name</label>
    <input type="text" id="name" placeholder="Acme Corp" />
    <button onclick="createOrg()">Create</button>
    <button class="back" onclick="window.location.href='org_list.html'">← Back to List</button>
  </div>

  <script>
    const token = localStorage.getItem('token');
    if (!token) window.location.href = 'login.html';

    async function createOrg() {
      const name = document.getElementById('name').value.trim();
      if (!name) return;

      const res = await fetch('http://localhost:3000/org/create', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + token
        },
        body: JSON.stringify({ name })
      });

      const data = await res.json();

      if (res.ok) {
        document.getElementById('success').style.display = 'block';
        document.getElementById('error').style.display = 'none';
        document.getElementById('name').value = '';
      } else {
        document.getElementById('error').innerText = data.error || 'Something went wrong';
        document.getElementById('error').style.display = 'block';
        document.getElementById('success').style.display = 'none';
      }
    }
  </script>
</body>
</html>
