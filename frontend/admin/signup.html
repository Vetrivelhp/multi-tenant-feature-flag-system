<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Signup</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; }
    .card { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); width: 360px; }
    h2 { margin-bottom: 1.5rem; color: #333; }
    label { display: block; margin-bottom: 0.4rem; color: #555; font-size: 14px; }
    input { width: 100%; padding: 0.6rem 0.8rem; border: 1px solid #ddd; border-radius: 4px; margin-bottom: 1rem; font-size: 14px; }
    button { width: 100%; padding: 0.7rem; background: #4f46e5; color: white; border: none; border-radius: 4px; font-size: 15px; cursor: pointer; }
    button:hover { background: #4338ca; }
    .link { text-align: center; margin-top: 1rem; font-size: 13px; color: #555; }
    .link a { color: #4f46e5; text-decoration: none; }
    .success { color: green; font-size: 13px; margin-bottom: 1rem; display: none; }
    .error { color: red; font-size: 13px; margin-bottom: 1rem; display: none; }
	select { width: 100%; padding: 0.6rem 0.8rem; border: 1px solid #ddd; border-radius: 4px; margin-bottom: 1rem; font-size: 14px; background: white; appearance: none; cursor: pointer; }
	select:focus { outline: none; border-color: #4f46e5; }
  </style>
</head>
<body>
  <div class="card">
    <h2>Admin Signup</h2>
    <p class="success" id="success">Registered! Please login.</p>
    <p class="error" id="error">Something went wrong.</p>
    <label>Email</label>
    <input type="email" id="email" placeholder="admin@company.com" />
    <label>Password</label>
    <input type="password" id="password" placeholder="••••••••" />
	<label>Organization</label>
	<select id="orgId">
	  <option value="">-- Select Organization --</option>
	</select>
    <button onclick="signup()">Sign Up</button>
    <div class="link">Already have an account? <a href="login.html">Login</a></div>
  </div>

  <script>
    async function signup() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const organizationId = parseInt(document.getElementById('orgId').value);

      if (!email || !password || !organizationId) return;

      const res = await fetch('http://localhost:3000/auth/admin/signup', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password, organizationId })
      });

      const data = await res.json();

      if (res.ok) {
        document.getElementById('success').style.display = 'block';
        document.getElementById('error').style.display = 'none';
        setTimeout(() => window.location.href = 'login.html', 1500);
      } else {
        document.getElementById('error').innerText = data.error || 'Something went wrong';
        document.getElementById('error').style.display = 'block';
        document.getElementById('success').style.display = 'none';
      }
    }
	async function loadOrgs() {
	  const res = await fetch('http://localhost:3000/org/list/public');
	  const orgs = await res.json();
	  const select = document.getElementById('orgId');
	  orgs.forEach(org => {
		const option = document.createElement('option');
		option.value = org.id;
		option.innerText = org.name;
		select.appendChild(option);
	  });
	}

loadOrgs();
  </script>
</body>
</html>
